        }
        .container {

        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">

    // Fungsi untuk memilih link secara acak (Random)
    function redirectToRandomLink() {
        if (targetLinks.length === 0) {
            document.body.innerHTML = "<h2>Error: Tidak ada link tujuan yang diatur.</h2>";
            return;
        }
        
        // Mengambil index acak dari array
        const randomIndex = Math.floor(Math.random() * targetLinks.length);
        const chosenLink = targetLinks[randomIndex];

        // Melakukan pengalihan (redirect)
        window.location.href = chosenLink;
    }

    // Jalankan fungsi setelah 1 detik (1000ms) untuk kesan loading yang kemas
    setTimeout(redirectToRandomLink, 1000);
</script>
